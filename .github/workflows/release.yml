name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: bun-darwin-arm64
            artifact: localdoc-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: localdoc-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: localdoc-linux-x64
          - os: ubuntu-latest
            target: bun-linux-x64-musl
            artifact: localdoc-linux-x64-musl
          - os: windows-latest
            target: bun-windows-x64
            artifact: localdoc-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile
        shell: bash
        run: |
          mkdir -p dist
          bun run scripts/build.ts "${{ matrix.target }}"
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
